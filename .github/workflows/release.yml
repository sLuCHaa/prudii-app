name: Release

# Baut Prudii Mail fuer Windows, macOS (Apple Silicon + Intel) und Linux (.deb).
#
# Ausloeser:
#   - Push eines Version-Tags (z. B. `git tag v1.1.2 && git push --tags`)
#     -> erstellt einen DRAFT-Release mit allen Installern.
#   - Manuell ueber den "Run workflow"-Button (workflow_dispatch)
#     -> baut nur und haengt die Installer als Download an den Actions-Run
#        (kein Release), praktisch zum Testen.
#
# Third-Party-Actions sind auf einen festen Commit-SHA gepinnt (Supply-Chain-
# Absicherung; bewegliche Tags koennten gekapert werden). Dependabot
# (.github/dependabot.yml) haelt die SHAs per PR aktuell.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-apple-silicon
            platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust-targets: aarch64-apple-darwin
          - name: macos-intel
            platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust-targets: x86_64-apple-darwin
          - name: linux-x86_64
            platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          - name: windows-x86_64
            platform: windows-latest
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Systempakete, die Tauri v2 auf Linux zum Bauen braucht
      # (webkit2gtk 4.1 = v2, ayatana-appindicator = tray-icon-Feature).
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            build-essential \
            file wget curl

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Schreibt den App-Store-Connect-API-Key (.p8) fuer die Notarisierung
      # aus dem Base64-Secret in eine Datei (nur macOS-Runner).
      - name: Prepare Apple notarization key (macOS)
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        run: echo "${{ secrets.APPLE_API_KEY_B64 }}" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"

      - name: Build & release
        id: tauri
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Compile-Zeit-Secret fuer Gmail-OAuth. build.rs liest zuerst die
          # Env-Variable -> hier reicht das Repository-Secret voellig.
          PRUDII_GOOGLE_CLIENT_SECRET: ${{ secrets.PRUDII_GOOGLE_CLIENT_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing + notarization (ignored on Windows/Linux runners)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
        with:
          # Nur bei einem Tag-Push wird ein Release erstellt; bei manuellen
          # Laeufen bleibt tagName leer -> es wird nur gebaut.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: 'Prudii Mail v__VERSION__'
          releaseBody: 'Prudii Mail v__VERSION__ — privacy-first desktop email client. Install the file for your platform below: Windows (.exe / .msi), macOS (.dmg — Apple Silicon or Intel), Linux (.deb / .rpm / .AppImage). Existing installations update automatically. Release notes below.'
          releaseDraft: true
          prerelease: false
          updaterJsonPreferNsis: true
          # Auto-retry: Apples Notary-Service / macOS-Runner haben sporadische
          # Netzwerk-Timeouts (actions/runner-images#14167) — dann neu versuchen.
          retryAttempts: 2
          args: ${{ matrix.args }}

      # Die AppImage bringt libwayland-* aus Ubuntu 22.04 mit und stellt sie per
      # LD_LIBRARY_PATH vor die System-Libs. Auf Distros mit neuem Mesa (Arch/
      # CachyOS) stirbt der WebKit-Prozess daran. Rausschmeissen und neu signieren
      # (die AppImage ist selbst das Updater-Artefakt).
      - name: Strip host-coupled libraries from AppImage
        if: matrix.platform == 'ubuntu-22.04'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bash scripts/fix-appimage.sh

      # Damit auch manuelle Laeufe (ohne Tag) herunterladbare Installer liefern.
      - name: Upload installers as workflow artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: prudii-${{ matrix.name }}
          if-no-files-found: ignore
          path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/deb/*.deb
            src-tauri/target/**/release/bundle/appimage/*.AppImage
            src-tauri/target/**/release/bundle/appimage/*.AppImage.sig
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/nsis/*.exe

  # tauri-action laedt die AppImage waehrend des Builds hoch — also die Version vor
  # dem Repack. Hier werden Asset und Signatur ersetzt und latest.json nachgezogen
  # (Asset-ID und Signatur aendern sich beide, sonst schlaegt das Auto-Update fehl).
  # Eigener Job, weil jeder Matrix-Job latest.json schreibt: erst wenn alle durch
  # sind, kann gefahrlos gepatcht werden.
  publish-linux-appimage:
    name: Publish repacked AppImage
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: prudii-linux-x86_64
          path: linux

      - name: Replace AppImage assets and patch latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          appimage="$(find linux -name '*.AppImage' -print -quit)"
          [ -n "$appimage" ] || { echo "repacked AppImage missing from artifacts" >&2; exit 1; }
          [ -f "${appimage}.sig" ] || { echo "signature missing for $appimage" >&2; exit 1; }

          gh release upload "$TAG" "$appimage" "${appimage}.sig" --clobber

          # --clobber re-uploads the asset, so it gets a fresh ID; latest.json
          # addresses assets by ID (the release is a draft and has no public URL yet).
          name="$(basename "$appimage")"
          asset_url="$(gh release view "$TAG" --json assets \
            --jq ".assets[] | select(.name == \"$name\") | .apiUrl")"
          [ -n "$asset_url" ] || { echo "uploaded asset not found in release" >&2; exit 1; }
          signature="$(cat "${appimage}.sig")"

          gh release download "$TAG" --pattern latest.json --dir . --clobber
          jq --arg url "$asset_url" --arg sig "$signature" '
            .platforms |= with_entries(
              if (.key == "linux-x86_64" or .key == "linux-x86_64-appimage")
              then .value.url = $url | .value.signature = $sig
              else . end
            )
          ' latest.json > latest.json.new
          mv latest.json.new latest.json
          gh release upload "$TAG" latest.json --clobber
